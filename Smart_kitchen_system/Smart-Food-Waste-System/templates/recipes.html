<!DOCTYPE html>
<html>
<head>
    <title>Smart Kitchen - Recipes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>🍲 Recommended Recipes</h1>

<div class="recipes">
  {% for r in recipes %}
    <div class="card">
        <img src="{{ r[3] }}">
        <h3>{{ r[0] }}</h3>
        <p>🍽 {{ r[1] }}</p>
        <a href="{{ r[2] }}" target="_blank">View Recipe</a>
    </div>
  {% endfor %}
</div>

</body>
</html>
