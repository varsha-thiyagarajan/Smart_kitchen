<!DOCTYPE html>
<html>
<head>
    <title>Recipe Recommendation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: #333;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #45a049;
        }

        #recipes {
            margin-top: 30px;
        }

        .recipe-card {
            background-color: white;
            padding: 15px;
            margin: 10px auto;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            font-size: 18px;
        }
    </style>

</head>
<body>

    <h1>🍳 Recipe Recommendation</h1>

    <button onclick="getRecipes()">Get Recipes</button>

    <div id="recipes"></div>

    <script>
       

async function getRecipes() {

    let pantry = JSON.parse(localStorage.getItem("pantry")) || [];

    let items = pantry.map(item => item.name);

    let response = await fetch("/recommend", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ pantry: items })
    });

    let data = await response.json();

    let div = document.getElementById("recipes");
    div.innerHTML = "";

    data.recipes.forEach(r => {
        let card = document.createElement("div");
        card.className = "recipe-card";
        card.innerText = r;
        div.appendChild(card);
    });
}


        
    </script>

</body>
</html>
